<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória - Tolkien Card Game</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="topo">
        <img src="imagens/1ring.gif" alt="">
        <h1 class="titulo">TOLKIEN CARD GAME</h1>
        <img src="imagens/1ring.gif" alt="">
    </div>

    <div class="table">
        <div class="card" onclick="virarCarta(this)">
            <div class="front">
                <img src="imagens/onering.gif" alt="">
            </div>
            <div class="back">
                <img src="imagens/lotr.png" alt="">
            </div>
        </div>
    </div>


    <audio autoplay loop>
        <source src="audios/LOTR-song.mp" type="audio/mp3">
    </audio>

    <script src="js/script.js"></script>
</body>

</html>
